<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandra AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <span>New chat</span>
                    <i class="fa-regular fa-pen-to-square"></i>
                </button>
            </div>

            <div class="history-container">
                <div class="section-title" style="padding: 0.5rem 0.75rem;">Recent</div>
                <ul class="history-list" id="history-list">
                    <!-- History items injected here -->
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="section-title">Generation Settings</div>
                
                <div class="setting-item">
                    <label>Image Style</label>
                    <select id="image-style-select">
                        <option value="pro">4K Agent Pro (Realistic)</option>
                        <option value="anime">Anime / Manga</option>
                        <option value="cinematic">Cinematic / 3D</option>
                        <option value="artistic">Artistic / Oil Painting</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Aspect Ratio</label>
                    <select id="aspect-ratio-select">
                        <option value="1:1">Square (1:1)</option>
                        <option value="16:9">Widescreen (16:9)</option>
                        <option value="9:16">Portrait (9:16)</option>
                        <option value="4:3">Photo (4:3)</option>
                        <option value="21:9">Ultra-Wide (21:9)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Resolution</label>
                    <select id="resolution-select">
                        <option value="Standard">Standard (1K)</option>
                        <option value="2K">High (2K)</option>
                        <option value="4K">Ultra HD (4K Agent)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>AI Model</label>
                    <select id="image-model-select">
                        <option value="flux">Flux (High Detail)</option>
                        <option value="nanobanana-pro">Nano Banana Pro</option>
                        <option value="seedream-pro">SeeDream Pro</option>
                    </select>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="footer-btn" id="theme-toggle">
                    <i class="fa-regular fa-sun"></i>
                    <span>Theme</span>
                </button>
                <button class="footer-btn" id="auth-btn">
                    <i class="fa-brands fa-google"></i>
                    <span id="auth-text">Log in</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-main">
            <header class="chat-header">
                <i class="fa-solid fa-bars menu-toggle" id="mobile-menu-btn"></i>
                <div class="model-info">4K Agent Image Generator</div>
                <div style="width: 24px;"></div> <!-- Spacer -->
            </header>
            
            <div class="chat-container" id="chat-container">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-logo">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <h1>What should I imagine?</h1>
                    
                    <div class="suggestion-grid">
                        <div class="suggestion-card">
                            <p><strong>A futuristic city</strong></p>
                            <p class="subtext">with neon lights and flying cars</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>A serene mountain</strong></p>
                            <p class="subtext">landscape at sunset, 4K resolution</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>An astronaut cat</strong></p>
                            <p class="subtext">floating in deep space, hyper-realistic</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>A cyberpunk street</strong></p>
                            <p class="subtext">in the rain, cinematic lighting</p>
                        </div>
                    </div>
                </div>

                <div class="messages-wrapper" id="messages-wrapper"></div>
            </div>

            <!-- Input Area -->
            <footer class="input-area">
                <div class="input-container">
                    <div class="input-row">
                        <textarea id="chat-input" placeholder="Describe the image you want to generate..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="input-footer">
                        <div class="icon-actions">
                            <input type="file" id="file-input" style="display: none;">
                            <button class="icon-btn" id="attach-btn"><i class="fa-solid fa-paperclip"></i></button>
                        </div>
                    </div>
                </div>
                <div id="toast-container" style="position:fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000;"></div>
            </footer>
        </main>
        <div id="sidebar-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:90;"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
