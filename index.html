<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANDRA x IMAGE | Fantastic Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="fantastic-bg"></div>

    <!-- Landing Gateway -->
    <div id="landing-screen" class="landing-overlay">
        <div class="landing-card">
            <div class="auth-header">
                <img src="assets/bot-logo.png" class="auth-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
                <h2>CHANDRA x IMAGE</h2>
                <p style="color: var(--text-dim); margin-bottom: 30px; font-weight: 300;">The Extreme Synthesis Laboratory</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="primary-btn" style="background: var(--accent-main); color: #fff; border: none; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; box-shadow: 0 10px 30px var(--accent-glow);" id="google-auth-btn">
                    <i class="fa-brands fa-google" style="margin-right: 12px;"></i> Authenticate with Google
                </button>
                <div style="display: flex; align-items: center; gap: 10px; margin: 5px 0;">
                    <div style="flex:1; height:1px; background: var(--glass-border);"></div>
                    <span style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600;">OR</span>
                    <div style="flex:1; height:1px; background: var(--glass-border);"></div>
                </div>
                <button class="new-chat-btn" id="anon-auth-btn" style="justify-content: center; border-radius: 20px; padding: 18px; font-size: 0.9rem;">
                    Enter as Guest Session
                </button>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app-container" id="app-container" style="display: none;">
        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content landing-card" style="max-width: 500px; text-align: left;">
                <div style="display:flex; justify-content: space-between; margin-bottom: 25px;">
                    <h3 style="font-weight: 800; letter-spacing: 1px;">LABORATORY CONFIG</h3>
                    <i class="fa-solid fa-xmark" id="close-settings-btn" style="cursor: pointer; opacity: 0.6;"></i>
                </div>
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="setting-item">
                        <label style="font-size: 0.7rem; font-weight: 800; color: var(--accent-alt); text-transform: uppercase;">Synthesis Quality</label>
                        <select id="quality-select" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; color: #fff; margin-top: 8px;">
                            <option value="4">High (4K)</option>
                            <option value="8">Ultra (8K)</option>
                            <option value="16">Extreme (16K)</option>
                            <option value="32">Ultimate (32K)</option>
                        </select>
                    </div>
                    <button class="primary-btn" id="save-settings-btn" style="background: var(--accent-main); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;">Apply Optimization</button>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <span>New Synthesis</span>
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <div class="history-container">
                <div class="section-title">Laboratory History</div>
                <ul class="history-list" id="history-list"></ul>
            </div>

            <div style="padding: 20px; border-top: 1px solid var(--glass-border);">
                <div id="user-profile" style="display: none; margin-bottom: 15px;">
                    <div style="display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 16px; border: 1px solid var(--glass-border);">
                        <img id="user-avatar" src="" style="width: 36px; height: 36px; border-radius: 12px; border: 2px solid var(--accent-main);">
                        <div style="flex: 1; overflow: hidden;">
                            <div id="user-name" style="font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Guest</div>
                            <div style="font-size: 0.65rem; color: var(--accent-alt); font-weight: 800;">PRO MEMBER</div>
                        </div>
                        <i class="fa-solid fa-right-from-bracket" id="logout-btn" style="cursor: pointer; opacity: 0.6;"></i>
                    </div>
                </div>
                <button class="nav-btn" id="open-settings-btn"><i class="fa-solid fa-sliders"></i> Laboratory Settings</button>
                <button class="nav-btn" id="theme-toggle"><i class="fa-solid fa-moon"></i> Visual Mode</button>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <div class="model-info">CHANDRA x IMAGE <span style="font-weight:300; opacity:0.5; font-size:0.8rem; margin-left:10px;">FANTASTIC PRO ENGINE</span></div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:8px; height:8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88;"></div>
                    <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; opacity: 0.7;">SYSTEM ACTIVE</span>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="welcome-screen" id="welcome-screen">
                    <img src="assets/bot-logo.png" style="width: 120px; height: 120px; border-radius: 35px; box-shadow: 0 0 60px var(--accent-glow); border: 2px solid var(--accent-main); margin-bottom: 30px;">
                    <h1 style="font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1;">Imagine the<br><span style="background: linear-gradient(to right, var(--accent-main), var(--accent-alt)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Impossible.</span></h1>
                    <p style="color: var(--text-dim); margin-top: 20px; font-size: 1.1rem; font-weight: 300;">Advanced 32K Multi-Engine AI Synthesis Laboratory</p>
                </div>
                <div class="messages-wrapper" id="messages-wrapper"></div>
            </div>

            <footer class="input-area">
                <div class="input-container">
                    <i class="fa-solid fa-wand-sparkles" style="color: var(--accent-alt); font-size: 1.2rem;"></i>
                    <textarea id="chat-input" placeholder="Describe your vision in 32K detail..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div id="toast-container" style="position:fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 1000;"></div>
            </footer>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
