<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandra AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <span>New chat</span>
                    <i class="fa-regular fa-pen-to-square"></i>
                </button>
            </div>

            <div class="history-container">
                <div class="section-title" style="padding: 0.5rem 0.75rem;">Recent</div>
                <ul class="history-list" id="history-list">
                    <!-- History items injected here -->
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="section-title">AI Lab</div>
                <div class="setting-item">
                    <select id="image-style-select">
                        <option value="pro">Imagineo 4K Pro</option>
                        <option value="anime">Anime Style</option>
                        <option value="cinematic">Cinematic 3D</option>
                    </select>
                </div>
                <div class="setting-item">
                    <select id="text-mode-select">
                        <option value="helpful">Helpful Mode</option>
                        <option value="coder">Coding Mode</option>
                    </select>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="footer-btn" id="theme-toggle">
                    <i class="fa-regular fa-sun"></i>
                    <span>Theme</span>
                </button>
                <button class="footer-btn" id="auth-btn">
                    <i class="fa-brands fa-google"></i>
                    <span id="auth-text">Log in</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-main">
            <header class="chat-header">
                <i class="fa-solid fa-bars menu-toggle" id="mobile-menu-btn"></i>
                <div class="model-info">Chandra AI</div>
                <div style="width: 24px;"></div> <!-- Spacer -->
            </header>
            
            <div class="chat-container" id="chat-container">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-logo">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h1>What can I help with?</h1>
                    
                    <div class="suggestion-grid">
                        <div class="suggestion-card">
                            <p><strong>Explain</strong></p>
                            <p class="subtext">quantum computing simply</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>Write code</strong></p>
                            <p class="subtext">for a simple snake game</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>Plan a trip</strong></p>
                            <p class="subtext">to the Swiss Alps</p>
                        </div>
                        <div class="suggestion-card">
                            <p><strong>Help me write</strong></p>
                            <p class="subtext">a professional email</p>
                        </div>
                    </div>
                </div>

                <div class="messages-wrapper" id="messages-wrapper"></div>
            </div>

            <!-- Input Area -->
            <footer class="input-area">
                <div class="input-container">
                    <div class="input-row">
                        <textarea id="chat-input" placeholder="Message Chandra AI..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="input-footer">
                        <div class="icon-actions">
                            <input type="file" id="file-input" style="display: none;">
                            <button class="icon-btn" id="attach-btn"><i class="fa-solid fa-paperclip"></i></button>
                            <button class="icon-btn" id="voice-btn"><i class="fa-solid fa-microphone"></i></button>
                            <button class="icon-btn" id="stop-speak-btn" style="display:none; color: #ff4d4d;"><i class="fa-solid fa-stop"></i></button>
                        </div>
                        <div class="mode-pills">
                            <div class="mode-pill active" data-mode="text">Chat</div>
                            <div class="mode-pill" data-mode="image">Image</div>
                            <div class="mode-pill" data-mode="voice">Voice</div>
                        </div>
                    </div>
                </div>
                <div id="toast-container" style="position:fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000;"></div>
            </footer>
        </main>
        <div id="sidebar-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:90;"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
